<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>GRANNY 3D (XP TEST)</title>
    <style type="text/css">
        html, body {
            width: 100%; height: 100%; margin: 0; padding: 0;
            background: #000; overflow: hidden;
            font-family: 'Arial', sans-serif;
            color: white; cursor: crosshair;
        }
        
        #viewport {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #222; overflow: hidden; z-index: 1;
        }

        #ceiling { position: absolute; top: 0; left: 0; width: 100%; height: 50%; background: #111; z-index: 1; font-size: 0; }
        #floor { position: absolute; top: 50%; left: 0; width: 100%; height: 50%; background: #333; z-index: 1; font-size: 0; }

        /* ПОЛОСКИ СТЕН */
        .strip { position: absolute; top: 0; width: 0; font-size: 0; z-index: 10; }

        /* СПРАЙТЫ (Гренни и Капканы) */
        .sprite { 
            position: absolute; display: none; 
            overflow: visible; 
            text-align: center;
            font-weight: bold;
            color: white;
            font-size: 12px;
            z-index: 1000; /* Очень высокий Z-Index */
        }
        
        /* Внешний вид Гренни без картинок */
        .granny-box {
            width: 100%; height: 100%;
            background: red; border: 2px solid maroon;
            filter: alpha(opacity=90); opacity: 0.9;
        }
        
        .trap-box {
            width: 100%; height: 100%;
            background: #555; border: 2px solid white;
            border-radius: 50%; /* Работает в IE9+, в IE6 будет квадратом */
        }

        /* ИНТЕРФЕЙС */
        #ui-layer { position: absolute; width: 100%; height: 100%; z-index: 20000; pointer-events: none; }
        
        #msg {
            position: absolute; top: 30%; width: 100%; text-align: center;
            font-size: 24px; color: yellow; font-weight: bold; display: none;
            background: black;
        }
        #trap-warn {
            position: absolute; bottom: 10%; width: 100%; text-align: center;
            font-size: 28px; color: red; font-weight: bold; display: none;
            background: black;
        }

        /* МЕНЮ */
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 30000; text-align: center;
        }
        .center { margin-top: 150px; }
        h1 { color: #d00; font-size: 48px; margin: 0; }
        button {
            background: #400; color: #fff; border: 2px solid red;
            padding: 10px 40px; font-size: 20px; cursor: pointer; margin-top: 20px;
        }

        /* СКРИМЕР */
        #jumpscare {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 25000; display: none; background: red;
        }
    </style>
</head>
<body>

    <div id="viewport">
        <div id="ceiling"></div>
        <div id="floor"></div>
    </div>

    <div id="ui-layer">
        <div id="msg">PRESS E</div>
        <div id="trap-warn">TRAPPED! HOLD 'SPACE'</div>
    </div>

    <div id="screen-start" class="screen">
        <div class="center">
            <h1>GRANNY XP</h1>
            <p>Controls: [W,S] Move | [A,D] Turn | [E] Action</p>
            <p style="color:red">SHE IS BEHIND THE WALL...</p>
            <button onclick="startGame()">START GAME</button>
        </div>
    </div>

    <div id="screen-dead" class="screen" style="display:none;">
        <div class="center">
            <h1 style="color:red;">YOU DIED</h1>
            <button onclick="window.location.reload()">TRY AGAIN</button>
        </div>
    </div>
    
    <div id="screen-win" class="screen" style="display:none;">
        <div class="center">
            <h1 style="color:lime;">ESCAPED!</h1>
            <button onclick="window.location.reload()">PLAY AGAIN</button>
        </div>
    </div>

    <div id="jumpscare"><h1 style="margin-top:200px; color:black; font-size:100px;">I SEE YOU!</h1></div>

    <script type="text/javascript" src="script.js"></script>
</body>
</html>
